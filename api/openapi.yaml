          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [electoralPeriod]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    AgendaItemResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [agendaItem]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    ApiMeta:
      type: object
      properties:
        version:
          type: string
        documentation:
          type: string
        license:
          type: object
          properties:
            label:
              type: string
            link:
              type: string

    Meta:
      type: object
      properties:
        api:
          $ref: '#/components/schemas/ApiMeta'
        requestStatus:
          type: string
          enum: [success, error]
