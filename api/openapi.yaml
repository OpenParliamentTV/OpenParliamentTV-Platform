      summary: IIIF Collection built from a media search
      description: |
        Returns a IIIF Presentation 3.0 Collection whose items are Manifest references to the
        media items matching the given search. Accepts the same query parameters as
        `/search/media` (e.g. `q`, `personID`, `factionID`, `dateFrom`/`dateTo`, `context`,
        including the `~context` suffix). Returns 404 when there are no matches.
      parameters:
        - name: q
          in: query
          required: false
          schema:
