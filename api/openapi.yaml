components:
  responses:
    RateLimited:
      description: Too Many Requests — per-IP rate limit exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            meta:
              api:
                version: "1.0"
                documentation: "https://de.openparliament.tv/api"
                license:
                  label: "ODC Open Database License (ODbL) v1.0"
                  link: "https://opendatacommons.org/licenses/odbl/1-0/"
              requestStatus: "error"
            errors:
              - status: "429"
                code: "RATE_LIMIT_EXCEEDED"
                title: "Too Many Requests"
                detail: "Rate limit exceeded. Please slow down or request an API key for higher limits."
                meta:
                  retryAfter: 42

  schemas:
    MediaSearchResponse:
      type: object
      description: |
        Media (speech) search response. Note the media search meta differs from the entity
        search meta: it carries a `results` object and date-range `attributes` instead of
        `page`/`pageTotal`. Pagination is driven by the `page`/`limit` request parameters;
        the only link returned is `self`.
      properties:
        meta:
          type: object
          properties:
            api:
              $ref: '#/components/schemas/ApiMeta'
            requestStatus:
              type: string
              enum: [success, error]
            attributes:
              type: object
              properties:
                speechFirstDateStr:
                  type: string
                  nullable: true
                speechFirstDateTimestamp:
                  type: integer
                  nullable: true
                speechLastDateStr:
                  type: string
                  nullable: true
                speechLastDateTimestamp:
                  type: integer
                  nullable: true
                resultsPerFaction:
                  type: array
                  items:
                    type: object
                days:
                  type: array
                  items:
                    type: object
            results:
              type: object
              properties:
                count:
                  type: integer
                  description: Number of items on this page
                total:
                  type: integer
                  description: Total number of matching items
                totalHits:
                  type: integer
        data:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string

    EntitySearchResponse:
      type: object
      description: |
        Entity search response (people, organisations, documents, terms). The meta carries the
        current `page` and total `pageTotal` count; the only link returned is `self`.
      properties:
        meta:
          type: object
          properties:
            api:
              $ref: '#/components/schemas/ApiMeta'
            requestStatus:
              type: string
              enum: [success, error]
            page:
              type: integer
            pageTotal:
              type: integer
        data:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string

    AutocompleteResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string

    IIIFResource:
      type: object
      description: |
        A IIIF Presentation API 3.0 resource (Manifest or Collection) as JSON-LD. Served with
        `Content-Type: application/ld+json` and `Access-Control-Allow-Origin: *`. See
        https://iiif.io/api/presentation/3.0/ for the full structure.
      properties:
        '@context':
          type: string
          example: http://iiif.io/api/presentation/3/context.json
        id:
          type: string
        type:
          type: string
          enum: [Manifest, Collection]
        label:
          type: object

    ErrorResponse:
      type: object
      properties:
        meta:
          type: object
          properties:
            api:
              $ref: '#/components/schemas/ApiMeta'
            requestStatus:
              type: string
              enum: [error]
        errors:
          type: array
          items:
            type: object
            properties:
              meta:
                type: object
                properties:
                  domSelector:
                    type: string
                  retryAfter:
                    type: integer
              status:
                type: string
              code:
                type: string
              title:
                type: string
              detail:
                type: string
        links:
          type: object
          properties:
            self:
              type: string

    MediaResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [media]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    PersonResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [person]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    OrganisationResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [organisation]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    DocumentResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [document]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    TermResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [term]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    SessionResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            type:
              type: string
              enum: [session]
            id:
              type: string
            attributes:
              type: object
            relationships:
              type: object
        links:
          type: object
          properties:
            self:
              type: string

    ElectoralPeriodResponse:
      type: object
      properties:
