          $ref: '#/components/responses/RateLimited'

  /autocomplete/{type}:
    get:
      tags:
        - Autocomplete
      summary: Type-ahead suggestions
      description: |
        Returns suggestions for the given query. `entities` returns mixed people/organisations/
        terms/documents; `text` returns full-text suggestions; `agendaItem` returns agenda-item
        suggestions. Matched substrings are wrapped in `<em>` tags in the returned labels.
      parameters:
        - name: type
          in: path
          description: Suggestion type
          required: true
          schema:
            type: string
            enum: [text, agendaItem, entities]
        - name: q
          in: query
          description: Query string (minimum 3 characters)
          required: true
          schema:
            type: string
            minLength: 3
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutocompleteResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                data:
                  - id: "Q567"
                    type: "person"
                    subtype: "memberOfParliament"
                    label: "Angela <em>Merk</em>el"
                    labelAlternative: "Angela Dorothea <em>Merk</em>el"
                    thumbnailURI: "https://de.openparliament.tv/content/client/images/entity-image.php?type=person&id=Q567"
                links:
                  self: "https://de.openparliament.tv/api/v1/autocomplete/entities?q=merk"

