openapi: 3.0.0
info:
  title: Open Parliament TV API
  version: '1.0'
  description: |
    API for accessing parliamentary data including speeches (media), documents, and related entities.

    The API is free to use and requires **no API key**. To protect the service against
    scraping and automated bulk traffic, requests are **rate-limited per client IP**
    (a few requests per second; see the `429` responses below). Logged-in sessions and a
    configurable IP allowlist are exempt. If you need higher or unlimited limits, please get
    in touch — an API key can be issued on request.

    If you want the complete raw dataset, do not scrape the API: all raw speech data imported
    into the platform is published in the Open Parliament TV GitHub data repositories
    (https://github.com/OpenParliamentTV/).

    The response envelope follows the JSON:API-inspired structure documented under the
    Specification tab of the `/api` page.
  license:
    name: ODC Open Database License (ODbL) v1.0
    url: https://opendatacommons.org/licenses/odbl/1-0/

servers:
  - url: https://de.openparliament.tv/api/v1
    description: Production server (German Bundestag instance)

# The public API requires no authentication (no API key). Rate limiting is applied per client IP.
security: []

tags:
  - name: Search
    description: Endpoints for searching various entities
  - name: Entities
    description: Endpoints for retrieving specific entities by ID
  - name: IIIF
    description: IIIF Presentation API 3.0 manifests and collections (JSON-LD)
  - name: Transcript
    description: WebVTT transcript downloads for media items
  - name: Autocomplete
    description: Type-ahead suggestion endpoints
  - name: System
    description: Service status

paths:
  /search/media:
    get:
      tags:
        - Search
      summary: Search for media content (speeches)
      description: |
        Search for parliamentary speeches with various filters.

        **Entity filters and context (`~`) syntax:** the entity-ID filters
        (`personID`, `organisationID`, `factionID`, `partyID`, `documentID`, `termID`)
        accept an optional per-value context suffix of the form `ID~context`, e.g.
        `personID=Q567~NER`. Without a suffix a per-type default context is used
        (`personID` → `main-speaker`, `factionID` → `main-speaker-faction`,
        `partyID` → `main-speaker-party`; others → no context filter). A global
        `context` parameter applies to entity filters that carry no own suffix.

        Valid context values by entity type:
        - person: `main-speaker` (default), `speaker`, `president`, `vice-president`, `interim-president`, `NER`
        - organisation: `main-speaker-faction` (default), `main-speaker-party` (default), `NER`, `proceedingsReference`
        - term: `NER`, `proceedingsReference`
        - document: `proceedingsReference`, `NER`

        All entity-ID and name filters accept either a single value or an array (`param[]=…`).
      parameters:
        - name: q
          in: query
          description: Full-text search query (minimum 3 characters)
          required: false
          schema:
            type: string
            minLength: 3
        - name: parliament
          in: query
          description: Parliament identifier (minimum 2 characters)
          required: false
          schema:
            type: string
            minLength: 2
        - name: electoralPeriod
          in: query
          description: Electoral period number (matches electoralPeriod.data.attributes.number)
          required: false
          schema:
            type: string
            minLength: 1
        - name: electoralPeriodID
          in: query
          description: Electoral period ID (matches electoralPeriod.data.id)
          required: false
          schema:
            type: string
            minLength: 1
        - name: sessionID
          in: query
          description: Session ID (matches session.data.id)
          required: false
          schema:
            type: string
            minLength: 1
        - name: sessionNumber
          in: query
          description: Session number (matches session.data.attributes.number)
          required: false
          schema:
            type: string
            minLength: 1
        - name: dateFrom
          in: query
          description: Start date in ISO format (e.g., "2017-10-28"); matches dateStart
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: End date in ISO format (e.g., "2017-12-22"); matches dateStart
          required: false
          schema:
            type: string
            format: date
        - name: party
          in: query
          description: Party name or array of party names (matches people.data.attributes.party.labelAlternative)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: partyID
          in: query
          description: Party Wikidata ID or array of IDs (matches organisations.data.id). Supports the `~context` suffix.
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: faction
          in: query
          description: Faction name or array of faction names (matches people.data.attributes.faction.labelAlternative)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: factionID
          in: query
          description: Faction Wikidata ID or array of IDs (matches organisations.data.id). Supports the `~context` suffix.
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: person
          in: query
          description: Person name (minimum 3 characters; matches people.data.attributes.label)
          required: false
          schema:
            type: string
            minLength: 3
        - name: personID
          in: query
          description: Person Wikidata ID or array of IDs (matches people.data.id). Supports the `~context` suffix (e.g. `Q567~NER`).
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: organisation
          in: query
          description: Organisation name or array of names (minimum 3 characters)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 3
              - type: array
                items:
                  type: string
                  minLength: 3
        - name: organisationID
          in: query
          description: Organisation Wikidata ID (matches people.data.attributes.party.id / people.data.attributes.faction.id). Supports the `~context` suffix.
          required: false
          schema:
            type: string
            pattern: '^Q[0-9]+$'
        - name: context
          in: query
          description: |
            Global annotation context applied to entity filters that do not carry their own
            `~context` suffix (minimum 3 characters). See the endpoint description for valid values.
          required: false
          schema:
            type: string
            minLength: 3
        - name: abgeordnetenwatchID
          in: query
          description: Abgeordnetenwatch ID (matches people.data.attributes.additionalInformation.abgeordnetenwatchID)
          required: false
          schema:
            type: string
            minLength: 1
        - name: fragDenStaatID
          in: query
          description: FragDenStaat ID
          required: false
          schema:
            type: string
            minLength: 1
        - name: personOriginID
          in: query
          description: Person origin identifier
          required: false
          schema:
            type: string
            minLength: 1
        - name: procedureID
          in: query
          description: Procedure identifier
          required: false
          schema:
            type: string
            minLength: 1
        - name: agendaItemID
          in: query
          description: Agenda item ID (matches agendaItem.data.id)
          required: false
          schema:
            type: string
            minLength: 2
        - name: agendaItemTitle
          in: query
          description: Agenda item title (minimum 3 characters; matches agendaItem.data.attributes.title)
          required: false
          schema:
            type: string
            minLength: 3
        - name: documentID
          in: query
          description: Document ID or array of IDs (matches documents.data.id). Supports the `~context` suffix.
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: termID
          in: query
          description: Term ID or array of IDs (matches terms.data.id). Supports the `~context` suffix.
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: id
          in: query
          description: Media ID (minimum 4 characters)
          required: false
          schema:
            type: string
            minLength: 4
        - name: aligned
          in: query
          description: Filter by transcript/audio alignment status
          required: false
          schema:
            type: boolean
        - name: numberOfTexts
          in: query
          description: Filter by number of text segments
          required: false
          schema:
            type: integer
        - name: sort
          in: query
          description: |
            Sort order. Defaults to relevance (by score) when omitted.
            `topic-*` is an alias of `date-*`.
          required: false
          schema:
            type: string
            enum:
              - date-asc
              - date-desc
              - topic-asc
              - topic-desc
              - duration-asc
              - duration-desc
              - changed-asc
              - changed-desc
        - name: limit
          in: query
          description: Maximum number of results per page
          required: false
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          description: Page number for pagination (1-based)
          required: false
          schema:
            type: integer
            minimum: 1
        - name: fields
          in: query
          description: 'Return only specified fields. The special value `id` returns an optimized ID-only list (`data: [{ type: media, id }]`).'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaSearchResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                  attributes:
                    speechFirstDateStr: "2018-04-11"
                    speechFirstDateTimestamp: 1523404800
                    speechLastDateStr: "2021-09-07"
                    speechLastDateTimestamp: 1631000000
                    resultsPerFaction: []
                    days: []
                  results:
                    count: 25
                    total: 128
                    totalHits: 0
                data:
                  - type: "media"
                    id: "DE-198765837"
                    attributes:
                      dateStart: "2018-04-11"
                      duration: 1200
                    relationships:
                      people:
                        data:
                          - type: "person"
                            id: "Q567"
                links:
                  self: "https://de.openparliament.tv/api/v1/search/media?q=Rente&factionID[]=Q2207512&dateFrom=2018-04-11"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "error"
                errors:
                  - status: "422"
                    code: "3"
                    title: "Invalid Attribute"
                    detail: "Search query must contain at least three characters."
                links:
                  self: "https://de.openparliament.tv/api/v1/search/media?q=Re"
        '429':
          $ref: '#/components/responses/RateLimited'

  /search/people:
    get:
      tags:
        - Search
      summary: Search for people
      description: Search for people with various filters
      parameters:
        - name: name
          in: query
          description: Name to search for (minimum 3 characters; matches label, firstName, lastName)
          required: false
          schema:
            type: string
            minLength: 3
        - name: type
          in: query
          description: Type (subtype) of person
          required: false
          schema:
            type: string
            enum: [memberOfParliament, person]
        - name: party
          in: query
          description: Party name or array of party names
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: partyID
          in: query
          description: Party Wikidata ID or array of IDs
          required: false
          schema:
            oneOf:
              - type: string
                pattern: '^Q[0-9]+$'
              - type: array
                items:
                  type: string
                  pattern: '^Q[0-9]+$'
        - name: faction
          in: query
          description: Faction name or array of faction names
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 1
              - type: array
                items:
                  type: string
                  minLength: 1
        - name: factionID
          in: query
          description: Faction Wikidata ID or array of IDs
          required: false
          schema:
            oneOf:
              - type: string
                pattern: '^Q[0-9]+$'
              - type: array
                items:
                  type: string
                  pattern: '^Q[0-9]+$'
        - name: organisationID
          in: query
          description: Organisation Wikidata ID (matches partyOrganisationID or factionOrganisationID)
          required: false
          schema:
            type: string
            pattern: '^Q[0-9]+$'
        - name: degree
          in: query
          description: Academic degree
          required: false
          schema:
            type: string
            minLength: 1
        - name: gender
          in: query
          description: Gender
          required: false
          schema:
            type: string
            enum: [male, female, nonbinary]
        - name: originID
          in: query
          description: Origin ID
          required: false
          schema:
            type: string
            minLength: 1
        - name: abgeordnetenwatchID
          in: query
          description: Abgeordnetenwatch ID
          required: false
          schema:
            type: string
            minLength: 1
        - name: fragDenStaatID
          in: query
          description: FragDenStaat ID
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySearchResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                  page: 1
                  pageTotal: 5
                data:
                  - type: "person"
                    id: "Q567"
                    attributes:
                      label: "Angela Merkel"
                      firstName: "Angela"
                      lastName: "Merkel"
                      gender: "female"
                      party:
                        label: "CDU"
                        id: "Q49764"
                links:
                  self: "https://de.openparliament.tv/api/v1/search/people?name=Michael&party=SPD"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /search/organisations:
    get:
      tags:
        - Search
      summary: Search for organisations
      description: |
        Search for organisations. In the Open Parliament TV data model, parties, factions,
        governments, companies and NGOs are all "organisations" — filter by the `type` parameter.
      parameters:
        - name: name
          in: query
          description: Name to search for (minimum 3 characters; matches label, labelAlternative, abstract)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 3
              - type: array
                items:
                  type: string
                  minLength: 3
        - name: type
          in: query
          description: 'Type of organisation (e.g. party, faction, government, company, ngo, otherOrganisation)'
          required: false
          schema:
            type: string
            minLength: 2
        - name: filterable
          in: query
          description: Restrict to organisations flagged as filterable in the UI (1) or not (0)
          required: false
          schema:
            type: integer
            enum: [0, 1]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySearchResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                  page: 1
                  pageTotal: 1
                data:
                  - type: "organisation"
                    id: "Q1007353"
                    attributes:
                      label: "BÜNDNIS 90/DIE GRÜNEN"
                      labelAlternative: "Die Grünen"
                      type: "faction"
                links:
                  self: "https://de.openparliament.tv/api/v1/search/organisations?name=Linke"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /search/documents:
    get:
      tags:
        - Search
      summary: Search for documents
      description: |
        Search for documents. Documents can be official documents ("Drucksachen"), law texts and
        other types — filter by the `type` parameter (e.g. officialDocument, legalDocument).
      parameters:
        - name: label
          in: query
          description: Document label to search for (minimum 3 characters; matches label, labelAlternative, abstract)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 3
              - type: array
                items:
                  type: string
                  minLength: 3
        - name: type
          in: query
          description: Type of document
          required: false
          schema:
            type: string
            minLength: 2
        - name: wikidataID
          in: query
          description: Wikidata ID (Q- or P-ID)
          required: false
          schema:
            type: string
            pattern: '^(Q|P)[0-9]+$'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySearchResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                  page: 1
                  pageTotal: 1
                data:
                  - type: "document"
                    id: "201"
                    attributes:
                      label: "Drucksache 19/5412"
                      type: "officialDocument"
                links:
                  self: "https://de.openparliament.tv/api/v1/search/documents?label=19/5412"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /search/terms:
    get:
      tags:
        - Search
      summary: Search for terms
      description: Search for terms with various filters
      parameters:
        - name: label
          in: query
          description: Term label to search for (minimum 3 characters; matches label, labelAlternative)
          required: false
          schema:
            oneOf:
              - type: string
                minLength: 3
              - type: array
                items:
                  type: string
                  minLength: 3
        - name: type
          in: query
          description: Type of term
          required: false
          schema:
            type: string
            minLength: 2
        - name: wikidataID
          in: query
          description: Wikidata ID (Q- or P-ID)
          required: false
          schema:
            type: string
            pattern: '^(Q|P)[0-9]+$'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySearchResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                  page: 1
                  pageTotal: 1
                data:
                  - type: "term"
                    id: "Q123456"
                    attributes:
                      label: "Rentenreform"
                links:
                  self: "https://de.openparliament.tv/api/v1/search/terms?label=digital"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /media/{id}:
    get:
      tags:
        - Entities
        - IIIF
      summary: Get media by ID
      description: |
        Retrieve a specific media item (speech) by its ID.

        **Content negotiation:** append `?format=iiif` (or send an `Accept` header of
        `application/ld+json`) to receive a IIIF Presentation API 3.0 **Manifest**
        (`application/ld+json`) instead of the default JSON:API response.

        Two parliamentary exchange formats are served from the same URI:
        `?format=akomantoso` (or `Accept: application/akn+xml`) returns an
        **Akoma Ntoso 1.0** (OASIS LegalDocML) debate document; `?format=parlamint`
        (or `Accept: application/tei+xml`) returns a **TEI** document following the
        ParlaMint conventions (Parla-CLARIN), including sentence-level audio/video
        alignment via a TEI timeline. For both XML formats, optional `type` and
        `lang` parameters select among multiple transcripts (same semantics as the
        WebVTT endpoint). The specific `application/akn+xml` / `application/tei+xml`
        content types are only sent when explicitly requested via `Accept`; other
        clients (e.g. browsers) receive `application/xml` so the document renders inline.
      parameters:
        - name: id
          in: path
          description: Media ID
          required: true
          schema:
            type: string
        - name: format
          in: query
          description: >-
            Alternative response format: `iiif` (IIIF Presentation 3.0 Manifest),
            `akomantoso` (Akoma Ntoso 1.0 XML, alias `akn`) or `parlamint`
            (TEI/ParlaMint XML, alias `tei`)
          required: false
          schema:
            type: string
            enum: [iiif, akomantoso, parlamint]
        - name: type
          in: query
          description: Transcript type for the XML export formats (e.g. `proceedings`, `generated`)
          required: false
          schema:
            type: string
        - name: lang
          in: query
          description: Transcript language for the XML export formats (BCP 47, e.g. `de`)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response (JSON:API, IIIF Manifest, Akoma Ntoso or TEI depending on `format`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                data:
                  type: "media"
                  id: "DE-198765837"
                  attributes:
                    dateStart: "2018-04-11"
                    duration: 1200
                  relationships:
                    people:
                      data:
                        - type: "person"
                          id: "Q567"
                links:
                  self: "https://de.openparliament.tv/api/v1/media/DE-198765837"
            application/ld+json:
              schema:
                $ref: '#/components/schemas/IIIFResource'
            application/akn+xml:
              schema:
                type: string
                description: Akoma Ntoso 1.0 debate document (XML)
            application/tei+xml:
              schema:
                type: string
                description: TEI document following the ParlaMint conventions (XML)
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /media/{id}/transcript.vtt:
    get:
      tags:
        - Transcript
      summary: Download a media item's transcript as WebVTT
      description: |
        Returns the speech transcript as a WebVTT (`text/vtt`) file, suitable for a
        `<track>` element or IIIF viewers. When `type`/`lang` are omitted the best
        available transcript is returned (preferring the proceedings transcript in the
        instance default language). Responses are cacheable and CORS-enabled.
      parameters:
        - name: id
          in: path
          description: Media ID
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: 'Transcript type filter (e.g. "proceedings", "generated")'
          required: false
          schema:
            type: string
        - name: lang
          in: query
          description: Language filter (BCP-47, e.g. "de")
          required: false
          schema:
            type: string
      responses:
        '200':
          description: WebVTT transcript
          content:
            text/vtt:
              schema:
                type: string
              example: |
                WEBVTT

                00:00:00.000 --> 00:00:05.000
