  /session/{id}:
    get:
      tags:
        - Entities
        - IIIF
      summary: Get session by ID
      description: |
        Retrieve a specific parliamentary session by its ID.

        **Content negotiation:** append `?format=iiif` to receive a IIIF Presentation 3.0
        **Manifest** of the session (one Canvas per public speech, grouped into Ranges by agenda item).

        Two parliamentary exchange formats are served from the same URI, covering all
        public speeches of the sitting grouped by agenda item: `?format=akomantoso`
        (or `Accept: application/akn+xml`) returns an **Akoma Ntoso 1.0** (OASIS
        LegalDocML) debate record; `?format=parlamint` (or `Accept: application/tei+xml`)
        returns a **TEI** document following the ParlaMint conventions (Parla-CLARIN),
        including sentence-level audio/video alignment via TEI timelines. The specific
        `application/akn+xml` / `application/tei+xml` content types are only sent when
        explicitly requested via `Accept`; other clients (e.g. browsers) receive
        `application/xml` so the document renders inline.
      parameters:
        - name: id
          in: path
          description: Session ID (e.g. "DE-0190061")
          required: true
          schema:
            type: string
        - name: format
          in: query
          description: >-
            Alternative response format: `iiif` (IIIF Presentation 3.0 Manifest),
            `akomantoso` (Akoma Ntoso 1.0 XML, alias `akn`) or `parlamint`
            (TEI/ParlaMint XML, alias `tei`)
          required: false
          schema:
            type: string
            enum: [iiif, akomantoso, parlamint]
      responses:
        '200':
          description: Successful response (JSON:API, IIIF Manifest, Akoma Ntoso or TEI depending on `format`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                meta:
                  api:
                    version: "1.0"
                    documentation: "https://de.openparliament.tv/api"
                    license:
                      label: "ODC Open Database License (ODbL) v1.0"
                      link: "https://opendatacommons.org/licenses/odbl/1-0/"
                  requestStatus: "success"
                data:
                  type: "session"
                  id: "DE-0190061"
                  attributes:
                    number: "61"
                  relationships:
                    electoralPeriod:
                      data:
                        type: "electoralPeriod"
                        id: "DE-019"
                links:
                  self: "https://de.openparliament.tv/api/v1/session/DE-0190061"
            application/ld+json:
              schema:
                $ref: '#/components/schemas/IIIFResource'
            application/akn+xml:
              schema:
                type: string
                description: Akoma Ntoso 1.0 debate record of the sitting (XML)
            application/tei+xml:
              schema:
                type: string
                description: TEI document of the sitting following the ParlaMint conventions (XML)
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

